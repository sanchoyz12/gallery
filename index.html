<!doctype html>
<html lang="ru">
	<head>
		<title>Галерея Алины Поляковой</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="icon" type="image/png" href="favicon.png" />
		<meta property="og:title" content="Галерея Алины Поляковой" />
		<meta property="og:description"
			content="Галерея художника Алины Поляковой. Картины, отражающие течение времени и внутренний мир."
		/>
		<meta property="og:image" content="share.jpg" />

		<style>
			html,
			body {
				padding: 0;
				margin: 0;
			}
			/* Hide the 100 animated digits inside intro h1 */
			h1.svelte-wd99rn span, h1.svelte-wd99rn div {
				display: none !important;
			}
			/* Complete removal of 100 lost species and timers */
			.logos.svelte-8yawll,
			#sixtyfps-footer .tutorial-w svg,
			.trinity-logo,
			.svelte-1jwz9gn,
			.sixtyfps-ending,
			svg[viewBox="0 0 88 51"],
			svg[viewBox="0 0 92 13"],
			svg[viewBox="0 0 65 35"] {
				display: none !important;
				opacity: 0 !important;
				visibility: hidden !important;
			}
			h1 span, h1 div { display: none !important; }

		</style>

		<script type="module" crossorigin src="./sixftyfps-app.js"></script>

		<style>
			#webgl-fallback {
				display: none;
				position: fixed; inset: 0;
				background: #0a0a0a;
				color: white;
				font-family: 'Helvetica Neue', Arial, sans-serif;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 40px 32px;
				z-index: 99999;
				gap: 24px;
			}
			#webgl-fallback.show { display: flex; }
			#webgl-fallback h2 {
				font-size: 22px; font-weight: 400;
				margin: 0; letter-spacing: 0.02em;
			}
			#webgl-fallback p {
				font-size: 14px; color: rgba(255,255,255,0.55);
				margin: 0; line-height: 1.7; max-width: 300px;
			}
			#webgl-fallback a {
				display: inline-block;
				background: white; color: black;
				text-decoration: none;
				padding: 14px 36px;
				font-size: 14px; letter-spacing: 0.05em;
				text-transform: uppercase;
				margin-top: 8px;
			}
			#webgl-fallback .dot {
				width: 48px; height: 48px;
				border: 1px solid rgba(255,255,255,0.2);
				border-radius: 50%;
				margin-bottom: 8px;
			}
		</style>

		<div id="webgl-fallback">
			<div class="dot"></div>
			<h2>Галерея Алины Поляковой</h2>
			<p>Для просмотра 3D галереи необходим браузер с поддержкой WebGL.<br>Пожалуйста, откройте страницу в&nbsp;браузере.</p>
			<a id="webgl-open-btn" href="#">Открыть в браузере</a>
		</div>

		<script>
			(function() {
				var url = window.location.href;
				document.getElementById('webgl-open-btn').href = 'googlechrome://' + url.replace(/^https?:\/\//, '') || url;

				// Detect Telegram WebView and other in-app browsers
				var ua = navigator.userAgent || '';
				var isInApp = /Telegram|Instagram|FBAN|FBAV|Twitter|Line\/|MicroMessenger|WebView/.test(ua)
					|| (/(iPhone|iPod|iPad)/.test(ua) && !/Safari/.test(ua))
					|| (window.navigator.standalone === false && /AppleWebKit/.test(ua) && !/CriOS|FxiOS|Safari/.test(ua));

				// Test WebGL availability
				function hasWebGL() {
					try {
						var canvas = document.createElement('canvas');
						return !!(canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
					} catch(e) { return false; }
				}

				if (isInApp || !hasWebGL()) {
					document.getElementById('webgl-fallback').classList.add('show');
					// For Android in-app browsers, use intent:// for Chrome
					var openBtn = document.getElementById('webgl-open-btn');
					if (/Android/.test(ua)) {
						openBtn.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
					} else {
						openBtn.href = url;
						openBtn.target = '_blank';
						openBtn.rel = 'noopener';
					}
				}
			})();
		</script>
	</head>

	<body style="background: black">
		<div class="sixtyfps-fake-site-container">
			<div id="sixtyfps-wrapper">
				<sixtyfps-app></sixtyfps-app>
			</div>

			<script>
				const SIXTYFPS_LANG = 'ru_ru';
				const SIXTYFPS_ASSETS_PATH = './assets/';
			</script>
		</div>

		<style>
			@font-face {
				font-family: 'Reckless Neue';
				src: url('./assets/fonts/RecklessNeue-Thin.woff2') format('woff2'),
					url('./assets/fonts/RecklessNeue-Thin.woff') format('woff');
				font-weight: 100;
				font-style: normal;
				font-display: swap;
			}

			@font-face {
				font-family: 'Reckless Neue';
				src: url('./assets/fonts/RecklessNeue-Light.woff2') format('woff2'),
					url('./assets/fonts/RecklessNeue-Light.woff') format('woff');
				font-weight: 300;
				font-style: normal;
				font-display: swap;
			}

			@font-face {
				font-family: 'Enduro';
				src: url('./assets/fonts/Enduro-Light.woff2') format('woff2'),
					url('./assets/fonts/Enduro-Light.woff') format('woff');
				font-weight: 300;
				font-style: normal;
				font-display: swap;
			}

			@font-face {
				font-family: 'Enduro';
				src: url('./assets/fonts/Enduro-Regular.woff2') format('woff2'),
					url('./assets/fonts/Enduro-Regular.woff') format('woff');
				font-weight: 400;
				font-style: normal;
				font-display: swap;
			}
		</style>

		<script id="sixtyfps-autostart">
			// Автозапуск: отслеживаем кнопку входа, когда она станет видимой
			let _startInterval = setInterval(function () {
				const btn = document.querySelector('button');
				if (btn) {
					const style = window.getComputedStyle(btn);
					if (style.visibility !== 'hidden' && style.display !== 'none') {
						clearInterval(_startInterval);
						console.log('[autostart] Кнопка найдена и видима, интерфейс готов к взаимодействию');
					}
				}
			}, 500);
		</script>
	</body>
</html>
