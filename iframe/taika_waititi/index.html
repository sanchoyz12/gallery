<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Интерактивный материал</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0b0b0b;
      color: #f4efe8;
      font-family: Georgia, "Times New Roman", serif;
    }
    body {
      display: grid;
      place-items: center;
      padding: 32px;
      box-sizing: border-box;
    }
    main {
      max-width: 760px;
      text-align: center;
      line-height: 1.6;
    }
    h1 {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 400;
      margin: 0 0 18px;
    }
    p {
      font-size: clamp(16px, 2vw, 20px);
      margin: 0 0 14px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <h1>Интерактивный материал</h1>
    <p>Для этой карточки в исходной сборке не было встроенной страницы.</p>
    <p>Раздел сохранён, чтобы проект открывался без ошибок и не вёл на отсутствующий файл.</p>
  </main>
</body>
</html>
