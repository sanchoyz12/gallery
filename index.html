		<script type="module" crossorigin src="./sixftyfps-app.js"></script>

		<script>
			// Register Service Worker for aggressive asset caching
			if ('serviceWorker' in navigator) {
				window.addEventListener('load', function() {
					navigator.serviceWorker.register('./sw.js').catch(function(){});
				});
			}

			// Load timeout guard: if app doesn't start in 40s, auto-reload once
			(function() {
				var TIMEOUT_KEY = 'gallery_timeout_reload';
				var timeoutId = setTimeout(function() {
					// Check if 3D scene initialized (APP_LOADED should have fired)
					if (!window._galleryLoaded) {
						if (!sessionStorage.getItem(TIMEOUT_KEY)) {
							sessionStorage.setItem(TIMEOUT_KEY, '1');
							window.location.reload();
						} else {
							// Second time — show error screen
							sessionStorage.removeItem(TIMEOUT_KEY);
							var el = document.getElementById('load-error');
							if (el) el.classList.add('show');
						}
					}
				}, 40000);

				// Mark as loaded when APP_LOADED fires
				window.addEventListener('gallery:loaded', function() {
					window._galleryLoaded = true;
					clearTimeout(timeoutId);
					sessionStorage.removeItem(TIMEOUT_KEY);
				});
			})();
		</script>

		<style>
			#webgl-fallback {
				display: none;
				position: fixed; inset: 0;
				background: #0a0a0a;
				color: white;
				font-family: 'Helvetica Neue', Arial, sans-serif;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 40px 32px;
				z-index: 99999;
				gap: 24px;
			}
			#webgl-fallback.show { display: flex; }
			#webgl-fallback h2 {
				font-size: 22px; font-weight: 400;
				margin: 0; letter-spacing: 0.02em;
			}
			#webgl-fallback p {
				font-size: 14px; color: rgba(255,255,255,0.55);
				margin: 0; line-height: 1.7; max-width: 300px;
			}
			#webgl-fallback a {
				display: inline-block;
				background: white; color: black;
				text-decoration: none;
				padding: 14px 36px;
				font-size: 14px; letter-spacing: 0.05em;
				text-transform: uppercase;
				margin-top: 8px;
			}
			#webgl-fallback .dot {
				width: 48px; height: 48px;
				border: 1px solid rgba(255,255,255,0.2);
				border-radius: 50%;
				margin-bottom: 8px;
			}
		</style>

		<div id="webgl-fallback">
			<div class="dot"></div>
			<h2>Галерея Алины Поляковой</h2>
			<p>Для просмотра 3D галереи необходим браузер с поддержкой WebGL.<br>Пожалуйста, откройте страницу в&nbsp;браузере.</p>
			<a id="webgl-open-btn" href="#">Открыть в браузере</a>
		</div>

		<script>
			(function() {
				var url = window.location.href;
				document.getElementById('webgl-open-btn').href = 'googlechrome://' + url.replace(/^https?:\/\//, '') || url;

				// Detect Telegram WebView and other in-app browsers
				var ua = navigator.userAgent || '';
				var isInApp = /Telegram|Instagram|FBAN|FBAV|Twitter|Line\/|MicroMessenger|WebView/.test(ua)
					|| (/(iPhone|iPod|iPad)/.test(ua) && !/Safari/.test(ua))
					|| (window.navigator.standalone === false && /AppleWebKit/.test(ua) && !/CriOS|FxiOS|Safari/.test(ua));

				// Test WebGL availability
				function hasWebGL() {
					try {
						var canvas = document.createElement('canvas');
						return !!(canvas.getContext('webgl2') || canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
					} catch(e) { return false; }
				}

				if (isInApp || !hasWebGL()) {
					document.getElementById('webgl-fallback').classList.add('show');
					// For Android in-app browsers, use intent:// for Chrome
					var openBtn = document.getElementById('webgl-open-btn');
					if (/Android/.test(ua)) {
						openBtn.href = 'intent://' + url.replace(/^https?:\/\//, '') + '#Intent;scheme=https;package=com.android.chrome;end';
					} else {
						openBtn.href = url;
						openBtn.target = '_blank';
						openBtn.rel = 'noopener';
					}
				}
			})();
		</script>

		<!-- Slow connection / chunk load error recovery -->
		<style>
			#load-error {
				display: none;
				position: fixed; inset: 0;
				background: #0a0a0a;
				color: white;
				font-family: 'Helvetica Neue', Arial, sans-serif;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				text-align: center;
				padding: 40px 32px;
				z-index: 99998;
				gap: 20px;
			}
			#load-error.show { display: flex; }
			#load-error h2 {
				font-size: 20px; font-weight: 400;
				margin: 0; letter-spacing: 0.02em;
			}
			#load-error p {
				font-size: 13px; color: rgba(255,255,255,0.5);
				margin: 0; line-height: 1.8; max-width: 280px;
			}
			#load-error button {
				background: white; color: black; border: none;
				padding: 14px 36px; cursor: pointer;
				font-size: 14px; letter-spacing: 0.05em;
				text-transform: uppercase; margin-top: 8px;
				font-family: inherit;
			}
			#load-error button:active { opacity: 0.8; }
			#load-error .spinner {
				width: 32px; height: 32px;
				border: 1px solid rgba(255,255,255,0.15);
				border-top-color: rgba(255,255,255,0.6);
				border-radius: 50%;
				animation: spin 1s linear infinite;
			}
			#load-error.loaded .spinner { display: none; }
			@keyframes spin { to { transform: rotate(360deg); } }
		</style>

		<div id="load-error">
			<div class="spinner"></div>
			<h2>Загрузка прервана</h2>
			<p>Соединение слишком медленное или нестабильное.<br>Попробуйте ещё раз.</p>
			<button onclick="window.location.reload()">Повторить</button>
		</div>

		<script>
			(function() {
				var RETRY_KEY = 'gallery_retry';
				var shown = false;

				function showError() {
					if (shown) return;
					shown = true;
					document.getElementById('load-error').classList.add('show');
				}

				// vite:preloadError — fired when a dynamic import chunk fails to load
				window.addEventListener('vite:preloadError', function(e) {
					e.preventDefault(); // prevent re-throw
					// Auto-reload once on first failure
					if (!sessionStorage.getItem(RETRY_KEY)) {
						sessionStorage.setItem(RETRY_KEY, '1');
						window.location.reload();
					} else {
						sessionStorage.removeItem(RETRY_KEY);
						showError();
					}
				});

				// Catch unhandled promise rejections (failed dynamic imports, network errors)
				window.addEventListener('unhandledrejection', function(e) {
					var msg = (e.reason && (e.reason.message || String(e.reason))) || '';
					// Only catch chunk/network loading errors, not app logic errors
					if (/Failed to fetch|Load failed|Loading chunk|NetworkError|net::ERR/.test(msg)) {
						e.preventDefault();
						if (!sessionStorage.getItem(RETRY_KEY)) {
							sessionStorage.setItem(RETRY_KEY, '1');
							window.location.reload();
						} else {
							sessionStorage.removeItem(RETRY_KEY);
							showError();
						}
					}
				});

				// Clear retry flag when page loads successfully
				window.addEventListener('load', function() {
					// Give the app 15 seconds to initialize before clearing
					setTimeout(function() {
						sessionStorage.removeItem(RETRY_KEY);
					}, 15000);
				});
			})();
		</script>

		<script id="sixtyfps-autostart">
			// Автозапуск: отслеживаем кнопку входа, когда она станет видимой
			let _startInterval = setInterval(function () {
				const btn = document.querySelector('button');
				if (btn) {
					const style = window.getComputedStyle(btn);
					if (style.visibility !== 'hidden' && style.display !== 'none') {
						clearInterval(_startInterval);
						console.log('[autostart] Кнопка найдена и видима, интерфейс готов к взаимодействию');
					}
				}
			}, 500);
		</script>
